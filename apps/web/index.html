<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livedot — Real-time Website Visitor Tracker</title>
    <meta name="description" content="Self-hosted, real-time website visitor tracker. See live visitors as glowing dots on a dark world map." />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="light dark" />
    
    <style>
      html, body {
        margin: 0;
        background: transparent;
      }
    
      @media (prefers-color-scheme: dark) {
        html, body {
          background: transparent;
        }
      }
    </style>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Livedot — Real-time Website Visitor Tracker" />
    <meta property="og:description" content="Self-hosted, real-time website visitor tracker. See live visitors as glowing dots on a dark world map." />
    <meta property="og:image" content="/images/opengraph.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Livedot — Real-time Website Visitor Tracker" />
    <meta name="twitter:description" content="Self-hosted, real-time website visitor tracker. See live visitors as glowing dots on a dark world map." />
    <meta name="twitter:image" content="/images/opengraph.png" />

    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.21.0/dist/maplibre-gl.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
